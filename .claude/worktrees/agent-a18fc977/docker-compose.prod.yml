version: '3.8'

services:
  # ============================================================================
  # PostgreSQL - Producao
  # ============================================================================
  postgres-prod:
    image: postgres:16-alpine
    container_name: erp-postgres-prod
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_prod_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-erp_prod}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
      - postgres-prod-backup:/backups
    networks:
      - erp-prod-network
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-erp_prod_user} -d ${POSTGRES_DB:-erp_prod}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================================
  # Redis - Producao (com senha e persistencia)
  # ============================================================================
  redis-prod:
    image: redis:7-alpine
    container_name: erp-redis-prod
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:?Defina REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-prod-data:/data
    networks:
      - erp-prod-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================================
  # MinIO - Producao
  # ============================================================================
  minio-prod:
    image: minio/minio:latest
    container_name: erp-minio-prod
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Defina MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Defina MINIO_SECRET_KEY}
    volumes:
      - minio-prod-data:/data
    command: server /data --console-address ":9001"
    networks:
      - erp-prod-network
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================================
  # API NestJS - Producao
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: erp-api-prod
    restart: always
    ports:
      - '3001:3001'
    env_file:
      - .env.production
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
      minio-prod:
        condition: service_healthy
    networks:
      - erp-prod-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # Web Next.js - Producao
  # ============================================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: erp-web-prod
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env.production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - erp-prod-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres-prod-data:
  postgres-prod-backup:
  redis-prod-data:
  minio-prod-data:

networks:
  erp-prod-network:
    driver: bridge
