version: '3.8'

services:
  # ============================================================================
  # PostgreSQL - Desenvolvimento
  # ============================================================================
  postgres-dev:
    image: postgres:16-alpine
    container_name: erp-postgres-dev
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: erp_dev_user
      POSTGRES_PASSWORD: erp_dev_password
      POSTGRES_DB: erp_dev
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - erp-dev-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp_dev_user -d erp_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis - Desenvolvimento (sem senha)
  # ============================================================================
  redis-dev:
    image: redis:7-alpine
    container_name: erp-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-dev-data:/data
    networks:
      - erp-dev-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # MinIO - Desenvolvimento
  # ============================================================================
  minio-dev:
    image: minio/minio:latest
    container_name: erp-minio-dev
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: erp_dev_minio
      MINIO_ROOT_PASSWORD: erp_dev_minio_pass
    volumes:
      - minio-dev-data:/data
    command: server /data --console-address ":9001"
    networks:
      - erp-dev-network
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-dev-data:
  redis-dev-data:
  minio-dev-data:

networks:
  erp-dev-network:
    driver: bridge
