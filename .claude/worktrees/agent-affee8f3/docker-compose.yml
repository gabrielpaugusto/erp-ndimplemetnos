version: '3.8'

services:
  # ============================================================================
  # PostgreSQL — Banco de dados principal
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp_implementos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp_user -d erp_implementos']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis — Cache e filas (sessões, jobs)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # MinIO — Object storage (certificados digitais, XMLs NF-e, relatórios)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: erp-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001' # Console
    environment:
      MINIO_ROOT_USER: erp_minio
      MINIO_ROOT_PASSWORD: erp_minio_password
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  minio-data:
