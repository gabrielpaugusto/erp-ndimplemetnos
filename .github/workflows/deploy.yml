name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/erp-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/erp-web

jobs:
  # ============================================================
  # JOB 1 — Build e publica imagens Docker no ghcr.io
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Docker meta — Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push — API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e Push — Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            NEXT_OUTPUT=standalone
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 2 — Deploy no VPS via SSH
  # ============================================================
  deploy:
    name: Deploy no Servidor
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (para pegar docker-compose.cloud.yml)
        uses: actions/checkout@v4

      - name: Copia docker-compose.cloud.yml para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: docker-compose.cloud.yml,nginx/erp.conf
          target: /opt/erp

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          CERT_ENCRYPTION_KEY: ${{ secrets.CERT_ENCRYPTION_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: CERT_ENCRYPTION_KEY
          script: |
            set -e
            cd /opt/erp

            # Login no ghcr.io
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Exporta variáveis de imagem para o compose
            export IMAGE_API=${{ env.IMAGE_API }}:latest
            export IMAGE_WEB=${{ env.IMAGE_WEB }}:latest

            # Baixa novas imagens
            docker pull $IMAGE_API
            docker pull $IMAGE_WEB

            # Injeta CERT_ENCRYPTION_KEY no .env.production (garante que nunca suma após redeploy)
            if [ -n "$CERT_ENCRYPTION_KEY" ]; then
              grep -v '^CERT_ENCRYPTION_KEY=' /opt/erp/.env.production > /tmp/env_clean.txt || true
              printf 'CERT_ENCRYPTION_KEY=%s\n' "$CERT_ENCRYPTION_KEY" >> /tmp/env_clean.txt
              mv /tmp/env_clean.txt /opt/erp/.env.production
              echo "✅ CERT_ENCRYPTION_KEY atualizada no .env.production"
            else
              echo "⚠️  Secret CERT_ENCRYPTION_KEY não definida no GitHub — chave NÃO atualizada"
            fi

            # Garante que o .env existe para o docker compose ler as variáveis
            cp /opt/erp/.env.production /opt/erp/.env

            # Garante que postgres está rodando antes de migrar
            docker compose -f docker-compose.cloud.yml up -d postgres redis minio
            echo "Aguardando postgres ficar pronto..."
            sleep 20

            # Executa prisma db push como passo isolado (com accept-data-loss para novos campos)
            echo "=== EXECUTANDO prisma db push ==="
            docker run --rm \
              --env-file /opt/erp/.env.production \
              --network erp_erp-net \
              $IMAGE_API \
              sh -c "prisma db push --schema packages/db/prisma/schema.prisma --skip-generate --accept-data-loss" \
              && echo "✅ prisma db push concluído com sucesso" \
              || echo "⚠️  prisma db push retornou erro — verifique o schema"

            # Sobe todos os serviços
            docker compose -f docker-compose.cloud.yml up -d || true

            # Aguarda containers estabilizarem
            sleep 15

            # Mostra status de todos os containers
            echo "=== STATUS DOS CONTAINERS ==="
            docker compose -f docker-compose.cloud.yml ps

            # Mostra logs da API para diagnostico
            echo "=== LOGS DO erp-api (ultimas 80 linhas) ==="
            docker logs erp-api --tail 80 2>&1 || echo "Container erp-api nao encontrado"

            # Verifica se a API está rodando
            if docker inspect erp-api --format='{{.State.Running}}' 2>/dev/null | grep -q "true"; then
              echo "✅ erp-api está rodando"
            else
              echo "❌ erp-api NAO esta rodando — verifique os logs acima"
              exit 1
            fi

            # Remove imagens antigas (libera espaço)
            docker image prune -f

            echo "✅ Deploy concluído em $(date)"
