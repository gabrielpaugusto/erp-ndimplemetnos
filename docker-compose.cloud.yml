version: '3.8'

# ============================================================================
# docker-compose.cloud.yml
# Usado pelo GitHub Actions no servidor de produção.
# As imagens vêm do ghcr.io (já pré-buildadas pelo CI).
# Variáveis IMAGE_API e IMAGE_WEB são injetadas pelo workflow.
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-erp_prod}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-backups:/backups
    networks:
      - erp-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-erp_user} -d ${POSTGRES_DB:-erp_prod}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Defina REDIS_PASSWORD no .env} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - erp-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # MinIO (armazenamento de arquivos: NFes, certificados, anexos)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: erp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Defina MINIO_ACCESS_KEY no .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Defina MINIO_SECRET_KEY no .env}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - erp-net
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # API NestJS — imagem pré-buildada pelo CI
  # --------------------------------------------------------------------------
  api:
    image: ${IMAGE_API:-ghcr.io/nd-implementos/erp-api:latest}
    container_name: erp-api
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - erp-net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --------------------------------------------------------------------------
  # Web Next.js — imagem pré-buildada pelo CI
  # --------------------------------------------------------------------------
  web:
    image: ${IMAGE_WEB:-ghcr.io/nd-implementos/erp-web:latest}
    container_name: erp-web
    restart: unless-stopped
    env_file: .env.production
    environment:
      # Aponta para a API interna (sem passar pelo nginx)
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    networks:
      - erp-net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------------------------
  # Nginx — reverse proxy público (porta 80/443)
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: erp-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/erp.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-webroot:/var/www/certbot
    depends_on:
      - web
      - api
    networks:
      - erp-net

volumes:
  postgres-data:
  postgres-backups:
  redis-data:
  minio-data:
  nginx-webroot:

networks:
  erp-net:
    driver: bridge
